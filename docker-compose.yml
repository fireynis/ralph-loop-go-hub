services:
  ralph-hub:
    build: .
    container_name: ralph-hub
    restart: unless-stopped
    environment:
      TZ: America/Toronto
    volumes:
      - ./config.yaml:/etc/ralph-hub/config.yaml:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ralph-hub.rule=Host(`ralph-hub.home.arpa`)"
      - "traefik.http.services.ralph-hub.loadbalancer.server.port=8080"

networks:
  proxy:
    external: true
